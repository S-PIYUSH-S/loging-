<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>instagram Login</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>
<body>
  <main class="login-wrapper">
    <section class="login-image-section" aria-hidden="true">
    </section>

    <section class="login-form-section mobile-login-section" aria-label="Login form">
  <div class="mobile-login-panel">
    <h1 class="mobile-login-title">Log in to instagram</h1>

    <form id="loginForm" class="mobile-login-form" novalidate>
      <div class="message" id="loginMessage" role="status" aria-live="polite"></div>

      <label class="mobile-field">
        <input type="text" id="username" name="username" placeholder=" " autocomplete="username" required>
        <span>Mobile number, username or email</span>
      </label>

      <label class="mobile-field">
        <input type="password" id="password" name="password" placeholder=" " autocomplete="current-password" required>
        <span>Password</span>
      </label>

      <button type="submit" class="mobile-login-btn" id="submitBtn">Log in</button>
    </form>

    <a href="#" class="mobile-forgot">Forgot password?</a>

    <div class="mobile-actions">
      <button type="button" class="mobile-secondary-btn">ⓕlog in with facebook</button>
      <button type="button" class="mobile-create-btn">Create new account</button>
    </div>

    <p class="mobile-brand">Login into instagram </p>
  </div>
</section>
  </main>
  </main>
<footer class="site-footer">
  <div class="footer-inner">
    <nav class="footer-links" aria-label="Footer links">
      <a href="#">Demo</a>
      <a href="#">About</a>
      <a href="#">Blog</a>
      <a href="#">Jobs</a>
      <a href="#">Help</a>
      <a href="#">API</a>
      <a href="#">Privacy</a>
      <a href="#">Terms</a>
      <a href="#">Locations</a>
      <a href="#">Popular</a>
      <a href="#">Lite</a>
      <a href="#">AI</a>
      <a href="#">Threads</a>
      <a href="#">Contact</a>
      <a href="#">Upload Help</a>
      <a href="#">Verified</a>
    </nav>

    <div class="footer-bottom">
      <span>English</span>
      <span>© 2026 instagram from meta</span>
    </div>
  </div>
</footer>
  

  <div id="loading-overlay" class="loading-overlay" aria-hidden="true">
    <div class="loader" aria-label="Loading"></div>
  </div>
</body>
</html>

</body>
</html>
